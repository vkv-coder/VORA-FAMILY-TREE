<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ratanshi Dada Family Tree</title>

<style>
body{margin:0;font-family:Arial;background:#faf9f5}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
color:#fff;
padding:15px 20px;
}
.left{font-size:20px;font-weight:bold}
.center{flex:1;text-align:center;color:#d4af37;font-size:20px}
.right button{
margin-left:8px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}
.map{background:#ffe8a1;font-weight:bold}

/* TREE */
#cw{height:calc(100vh - 70px);overflow:hidden;position:relative}
#mv{position:absolute}

/* NODE */
.nd{position:absolute}
.np{
padding:6px 10px;
border-radius:8px;
border:2px solid #333;
background:#fff;
font-size:12px;
text-align:center;
}
.dead{color:red}
.star{font-size:10px;color:#999}

/* TOOLBAR */
.ft{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:5px;
border-radius:10px;
}
.fb{padding:5px 10px;border:none;cursor:pointer}
.act{background:#000;color:#fff}
</style>
</head>

<body>

<header>
<div class="left">Ratanshi Dada Family</div>
<div class="center">🙏 Shree Bahuchar Matay Namah 🙏</div>
<div class="right">
<button onclick="window.open('rituals.pdf')">Ritual</button>
<button onclick="window.open('preamble.pdf')">Preamble</button>
<button class="map" onclick="window.open('https://maps.google.com/?q=Dholidhar Dhrangadhra')">
📍 Kuldevi Location
</button>
</div>
</header>

<div id="cw">
<div id="mv"></div>

<div class="ft">
<button class="fb act" id="bAll" onclick="setMode('all')">All</button>
<button class="fb" id="bLive" onclick="setMode('live')">Living</button>
</div>
</div>

<script>

/* ===== YOUR ORIGINAL DATA (UNCHANGED) ===== */
const FD = window.FD || FD

/* ===== MODE ===== */
let mode="all"

/* ===== BUTTON ===== */
function setMode(m){
mode=m
bAll.classList.remove("act")
bLive.classList.remove("act")
if(m==="all")bAll.classList.add("act")
if(m==="live")bLive.classList.add("act")
render()
}

/* ===== RENDER ===== */
function render(){

const mv=document.getElementById("mv")
mv.innerHTML=""

const data = FD.individuals

Object.values(data).forEach(p=>{

let nd=document.createElement("div")
nd.className="nd"

let np=document.createElement("div")
np.className="np"

if(p.deceased) np.classList.add("dead")

/* ===== FIXED LIVING LOGIC ===== */
if(mode==="live" && p.deceased){
np.innerHTML="*"
np.classList.add("star")
}else{
np.innerHTML=p.name
}

nd.appendChild(np)

/* KEEP YOUR ORIGINAL POSITIONING */
nd.style.left=p.x+"px"
nd.style.top=p.y+"px"

mv.appendChild(nd)

})

}

/* INIT */
window.onload=function(){
render()
}

</script>

</body>
</html>
