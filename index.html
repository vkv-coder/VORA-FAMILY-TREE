<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ratanshi Dada Family Tree</title>

<style>
body{margin:0;font-family:Arial;background:#faf9f5}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
color:#fff;
padding:15px 20px;
}

.left{font-size:20px;font-weight:bold}
.center{flex:1;text-align:center;color:#d4af37;font-size:20px}

.right button{
margin-left:8px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.map{background:#ffe8a1;font-weight:bold}

/* ===== TREE ===== */
#cw{height:calc(100vh - 70px);overflow:hidden;position:relative}
#mv{position:absolute}

/* node */
.nd{position:absolute}
.np{
padding:6px 10px;
border-radius:8px;
border:2px solid #333;
background:#fff;
text-align:center;
font-size:12px;
}

.dead{color:red}
.star{font-size:10px;color:#999}

/* toolbar */
.ft{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:5px;
border-radius:10px;
}

.fb{
border:none;
padding:5px 10px;
cursor:pointer;
}

.act{background:#000;color:#fff}
</style>
</head>

<body>

<header>
<div class="left">Ratanshi Dada Family</div>

<div class="center">🙏 Shree Bahuchar Matay Namah 🙏</div>

<div class="right">
<button>Ritual</button>
<button>Preamble</button>
<button class="map" onclick="window.open('https://maps.google.com/?q=Dholidhar Dhrangadhra')">
📍 Kuldevi Location
</button>
</div>
</header>

<div id="cw">
<div id="mv"></div>

<div class="ft">
<button class="fb act" onclick="setMode('all')" id="bAll">All</button>
<button class="fb" onclick="setMode('live')" id="bLive">Living</button>
</div>
</div>

<script>

/* ===== YOUR ORIGINAL DATA (SHORT SAMPLE — KEEP YOUR FULL DATA HERE) ===== */
const FD = {
  individuals:{
    I1:{name:"VIJAY VORA",deceased:false,depth:5},
    I2:{name:"Kantilal",deceased:true,depth:4},
    I3:{name:"Vrajlal",deceased:true,depth:3}
  }
}

/* ===== MODE ===== */
let mode="all"

/* ===== SWITCH ===== */
function setMode(m){
mode=m
document.getElementById("bAll").classList.remove("act")
document.getElementById("bLive").classList.remove("act")

if(m==="all") document.getElementById("bAll").classList.add("act")
if(m==="live") document.getElementById("bLive").classList.add("act")

render()
}

/* ===== RENDER ===== */
function render(){

const mv=document.getElementById("mv")
mv.innerHTML=""

Object.values(FD.individuals).forEach((p,i)=>{

let nd=document.createElement("div")
nd.className="nd"

let np=document.createElement("div")
np.className="np"

if(p.deceased) np.classList.add("dead")

/* ===== CORE FIX ===== */
if(mode==="live" && p.deceased){
np.innerHTML="*"
np.classList.add("star")
}else{
np.innerHTML=p.name
}

nd.appendChild(np)

/* position */
nd.style.left=(i*140)+"px"
nd.style.top=(p.depth*80)+"px"

mv.appendChild(nd)

})

}

render()

</script>

</body>
</html>
