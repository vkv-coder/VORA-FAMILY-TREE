<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vora Family Tree</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1A5FAD;--blue-lt:#E3EEF8;--blue-dk:#0B3F74;
  --pink:#A03365;--pink-lt:#F5E3EE;--pink-dk:#6E1F44;
  --gray:#7A7870;--gray-lt:#F0EEE8;
  --ink:#1C1B19;--muted:#8A8880;--line:#D8D5CC;
  --cream:#FAF9F5;--card:#FFFFFF;
  --shadow:0 2px 12px rgba(0,0,0,0.10);
  --node-w:110px;--node-h:52px;--h-gap:20px;--v-gap:72px;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
header{background:var(--ink);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;flex:1;letter-spacing:.3px}
.logo span{color:#C8A96A;font-size:13px;font-weight:400;display:block;letter-spacing:.5px;margin-top:-2px}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.hdr-btn.active{background:#C8A96A;color:var(--ink)}

/* ── Tabs ── */
.tabs-bar{background:var(--ink);padding:0 16px 10px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-pill{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid;white-space:nowrap;transition:all .15s;flex-shrink:0;font-family:'DM Sans',sans-serif}
.tab-pill.male{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue)}
.tab-pill.female{background:var(--pink-lt);color:var(--pink-dk);border-color:var(--pink)}
.tab-pill.other{background:var(--gray-lt);color:var(--gray);border-color:var(--gray)}
.tab-pill.active{background:#C8A96A!important;border-color:#C8A96A!important;color:var(--ink)!important}
.tab-pill.dec::before,.tab-pill.dec::after{content:'';position:absolute;left:8%;width:84%;height:1.5px;top:50%;border-radius:1px;pointer-events:none}
.tab-pill.dec.male::before,.tab-pill.dec.male::after{background:var(--blue-dk)}
.tab-pill.dec.female::before,.tab-pill.dec.female::after{background:var(--pink-dk)}
.tab-pill.dec.other::before,.tab-pill.dec.other::after{background:var(--gray)}
.tab-pill.dec::before{transform:rotate(9deg)}
.tab-pill.dec::after{transform:rotate(-9deg)}

/* ── Canvas area ── */
#canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none}
#canvas-wrap.panning{cursor:grabbing}
#tree-canvas{position:absolute;top:0;left:0;transform-origin:0 0}

/* ── SVG lines ── */
#lines-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* ── Tree node ── */
.t-node{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none}
.t-pill{position:relative;display:inline-flex;align-items:center;justify-content:center;width:var(--node-w);height:var(--node-h);border-radius:12px;border:2px solid;font-size:11.5px;font-weight:500;text-align:center;line-height:1.25;padding:4px 8px;transition:transform .12s,box-shadow .12s;box-shadow:var(--shadow);font-family:'DM Sans',sans-serif}
.t-pill:hover{transform:scale(1.04);box-shadow:0 4px 18px rgba(0,0,0,0.16)}
.t-pill.male{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue)}
.t-pill.female{background:var(--pink-lt);color:var(--pink-dk);border-color:var(--pink)}
.t-pill.other{background:var(--gray-lt);color:var(--gray);border-color:var(--gray)}
.t-pill .cross-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;border-radius:10px;overflow:hidden}
.t-expand{width:22px;height:22px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:4px;cursor:pointer;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.08);color:var(--muted);font-weight:500;transition:background .12s}
.t-expand:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.t-expand.hidden{visibility:hidden}
.spouse-connector{display:flex;align-items:center;gap:0}
.spouse-dash{width:18px;height:2px;background:var(--line);flex-shrink:0;margin-top:-28px}

/* ── Profile panel ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.panel{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:86vh;overflow-y:auto;padding-bottom:32px}
.p-handle{width:38px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 6px}
.p-head{display:flex;align-items:flex-start;gap:14px;padding:10px 18px 14px;border-bottom:1px solid var(--line)}
.p-avatar{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:600;flex-shrink:0}
.p-avatar.male{background:var(--blue-lt);color:var(--blue-dk);border:2px solid var(--blue)}
.p-avatar.female{background:var(--pink-lt);color:var(--pink-dk);border:2px solid var(--pink)}
.p-avatar.other{background:var(--gray-lt);color:var(--gray);border:2px solid var(--gray)}
.p-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;line-height:1.2;flex:1}
.p-gen{font-size:12px;color:var(--muted);margin-top:4px}
.close-x{background:var(--gray-lt);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--gray);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-body{padding:10px 18px}
.p-field{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-lt)}
.p-field:last-child{border:none}
.p-lbl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);width:80px;flex-shrink:0;padding-top:2px}
.p-val{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.p-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.p-pill{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid;cursor:pointer;transition:opacity .12s;white-space:nowrap}
.p-pill:hover{opacity:.75}
.p-pill.male{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue)}
.p-pill.female{background:var(--pink-lt);color:var(--pink-dk);border-color:var(--pink)}
.p-pill.other{background:var(--gray-lt);color:var(--gray);border-color:var(--gray)}
.p-pill .cross-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:hidden;border-radius:18px}
.edit-btn{display:block;margin:16px 18px 0;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;width:calc(100%-36px);text-align:center;font-family:'DM Sans',sans-serif;width:calc(100% - 36px)}

/* PIN */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center}
.pin-overlay.open{display:flex}
.pin-box{background:#fff;border-radius:18px;padding:28px 24px;width:290px;text-align:center}
.pin-box h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:6px}
.pin-box p{font-size:13px;color:var(--muted);margin-bottom:18px}
.pin-inp{width:100%;padding:13px;text-align:center;font-size:22px;letter-spacing:10px;border:1.5px solid var(--line);border-radius:10px;outline:none;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.pin-inp:focus{border-color:var(--blue)}
.pin-go{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif}
.pin-err{color:#c0392b;font-size:12px;margin-top:6px;min-height:18px}

/* Search */
.search-bar{position:absolute;top:10px;right:16px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.95);border-radius:20px;padding:6px 14px;border:1px solid var(--line);box-shadow:var(--shadow);z-index:40;transition:width .2s}
.search-bar input{border:none;outline:none;font-size:13px;width:140px;background:transparent;color:var(--ink);font-family:'DM Sans',sans-serif}
.search-bar svg{opacity:.45;flex-shrink:0}

/* Mini-map hint */
.zoom-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(28,27,25,0.7);color:#fff;border-radius:20px;padding:5px 14px;font-size:11px;pointer-events:none;z-index:40}

</style>
</head>

</div>

// ── Sex class ──
function sc(p){ return p.sex==='F'?'female':p.sex==='M'?'male':'male'; }

// ── Initials ──
function ini(name){
  const w=name.trim().split(/\s+/).filter(Boolean);
  return w.length>=2?(w[0][0]+w[w.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();
}

          'Generation 6','Generation 7','Generation 8','Generation 9','Generation 10','Generation 11'][d]||'Gen '+d;
}

// ── Build tabs ──
function buildTabs(){
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML='';
  // Root + Gen3 branches
  const root = Object.values(people).find(p=>p.depth===0);
  const gen3 = Object.values(people).filter(p=>p.depth===3).sort((a,b)=>parseInt(a.id.slice(1))-parseInt(b.id.slice(1)));
  [root,...gen3].forEach(p=>{
    if(!p) return;
    const cls=sc(p), dec=p.deceased?'dec':'';
    const btn=document.createElement('div');
    btn.className=`tab-pill ${cls} ${dec}`;
    btn.textContent=p.name;
    btn.dataset.id=p.id;
    btn.onclick=()=>{ selectTab(p.id,btn); };
    bar.appendChild(btn);
  });
  if(root) selectTab(root.id, bar.querySelector('.tab-pill'));
}

function selectTab(id, btn){
  activeRoot=id; collapsed=new Set();
  document.querySelectorAll('.tab-pill').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderTree();
  resetView();
}

// ── Layout engine ──
// Returns {nodes:[{id,x,y,spouseId}], width, height}
function layout(rootId){
  const nodes=[], placed=new Set();

  // Compute subtree leaf count for positioning
  function leafCount(id, vis=new Set()){
    if(vis.has(id)||collapsed.has(id)) return 1;
    vis.add(id);
    const p=people[id]; if(!p||!p.children.length) return 1;
    return p.children.reduce((s,c)=>s+leafCount(c,vis),0);
  }

  function place(id, x, y, vis=new Set()){
    if(vis.has(id)) return 0;
    vis.add(id); placed.add(id);
    const p=people[id]; if(!p) return 0;

    // Place spouse next to this person
    let spouseId=null, totalW=NW;
    if(p.spouses && p.spouses.length>0){
      spouseId=p.spouses[0];
      if(!placed.has(spouseId)){
        placed.add(spouseId);
        totalW = NW*2 + HG + 18; // node + dash + spouse
      }
    }

    nodes.push({id, x, y, spouseId, spouseX: spouseId? x+NW+18+HG : null});

    if(!collapsed.has(id) && p.children && p.children.length>0){
      // Compute widths
      const childLeaves=p.children.map(c=>leafCount(c));
      const totalLeaves=childLeaves.reduce((s,v)=>s+v,0);
      const totalChildW = totalLeaves*(NW+HG)-HG + (spouseId?18:0);
      
      let cx = x - (totalChildW - (spouseId? NW+18+HG : NW))/2;
      if(cx < 0) cx=0;

      const cy = y + NH + VG;

      p.children.forEach((cid,i)=>{
        const cw=(childLeaves[i])*(NW+HG);
        place(cid, cx + (cw-NW)/2, cy, vis);
        cx+=cw;
      });
    }
    return totalW;
  }

  if(orientation==='v'){
    place(rootId, 0, 0);
  } else {
    // Left-right: swap x/y roles using same algo but rotate at draw time
    place(rootId, 0, 0);
  }

  return nodes;
}

// ── Render ──
function renderTree(){
  canvas.innerHTML='<svg id="lines-svg"></svg>';
  const linesSvg=document.getElementById('lines-svg');
  if(!activeRoot) return;

  const nodes=layout(activeRoot);
  if(!nodes.length) return;

  // Compute bounding box
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,(n.spouseX||n.x)+NW); maxY=Math.max(maxY,n.y+NH);
  });
  const pad=60;
  const W=maxX-minX+pad*2, H=maxY-minY+pad*2;

  linesSvg.setAttribute('width',W); linesSvg.setAttribute('height',H);

  // Draw nodes & lines
  const parentOf={};
  nodes.forEach(n=>{
    const p=people[n.id]; if(!p) return;
    if(!collapsed.has(n.id) && p.children && p.children.length){
      p.children.forEach(cid=>{parentOf[cid]=n;});
    }
  });

  // Draw lines first
  nodes.forEach(n=>{
    const par=parentOf[n.id];
    if(!par) return;
    const p=people[par.id];
    const nx = n.x - minX + pad + NW/2;
    const ny = n.y - minY + pad;
    // Mid point of parent (or between parent+spouse)
    const parMidX = par.spouseX
      ? (par.x - minX + pad + NW + (par.spouseX - minX + pad))/2
      : par.x - minX + pad + NW/2;
    const parY = par.y - minY + pad + NH;

    // Vertical line from parent bottom to midpoint, then down to child top
    const midY = parY + VG/2;
    const line=`M${parMidX} ${parY} L${parMidX} ${midY} L${nx} ${midY} L${nx} ${ny}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',line);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#C8B89A');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('stroke-linejoin','round');
    linesSvg.appendChild(path);

    // Sibling connector (horizontal bar at midY)
  });

  // Draw spouse dashes
  nodes.forEach(n=>{
    if(!n.spouseId) return;
    const x1 = n.x - minX + pad + NW;
    const y1 = n.y - minY + pad + NH/2;
    const x2 = (n.spouseX||n.x+NW+18) - minX + pad;
    const dash=document.createElementNS('http://www.w3.org/2000/svg','line');
    dash.setAttribute('x1',x1); dash.setAttribute('y1',y1);
    dash.setAttribute('x2',x2); dash.setAttribute('y2',y1);
    dash.setAttribute('stroke','#C8B89A');
    dash.setAttribute('stroke-width','1.5');
    dash.setAttribute('stroke-dasharray','4 3');
    linesSvg.appendChild(dash);
    // Heart symbol at midpoint
    const tx=(x1+x2)/2, ty=y1;
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',tx); txt.setAttribute('y',ty+4);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','10');
    txt.setAttribute('fill','#C8B89A');
    txt.textContent='♥';
    linesSvg.appendChild(txt);
  });

  // Draw nodes
  nodes.forEach(n=>{
    const p=people[n.id]; if(!p) return;
    placeNode(p, n.x-minX+pad, n.y-minY+pad, false, n.spouseId);
    if(n.spouseId && people[n.spouseId]){
      placeNode(people[n.spouseId], (n.spouseX||n.x+NW+18)-minX+pad, n.y-minY+pad, true, null, true);
    }
  });

  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  applyCrosses();
}

function placeNode(p, x, y, isSpouse, spouseId, isSpouseNode=false){
  const cls=sc(p);
  const hasChildren=!collapsed.has(p.id) && p.children && p.children.length>0;
  const isCollapsed=collapsed.has(p.id) && p.children && p.children.length>0;

  const div=document.createElement('div');
  div.className='t-node';
  div.style.left=x+'px';
  div.style.top=y+'px';
  div.style.width=NW+'px';

  // Pill
  const pill=document.createElement('div');
  pill.className=`t-pill ${cls}`;
  pill.dataset.id=p.id;
  pill.style.width=NW+'px';
  pill.style.height=NH+'px';
  pill.innerHTML=`<span style="line-height:1.25;text-align:center;word-break:break-word">${p.name}</span>`;
  
  // Cross for deceased
  if(p.deceased){
    const cSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    cSvg.setAttribute('class','cross-svg');
    cSvg.setAttribute('viewBox',`0 0 ${NW} ${NH}`);
    const color=cls==='female'?'#6E1F44':'#0B3F74';
    const pad=10;
    const l1=document.createElementNS('http://www.w3.org/2000/svg','line');
    l1.setAttribute('x1',pad);l1.setAttribute('y1',pad);
    l1.setAttribute('x2',NW-pad);l1.setAttribute('y2',NH-pad);
    l1.setAttribute('stroke',color);l1.setAttribute('stroke-width','1.8');l1.setAttribute('stroke-linecap','round');
    const l2=document.createElementNS('http://www.w3.org/2000/svg','line');
    l2.setAttribute('x1',NW-pad);l2.setAttribute('y1',pad);
    l2.setAttribute('x2',pad);l2.setAttribute('y2',NH-pad);
    l2.setAttribute('stroke',color);l2.setAttribute('stroke-width','1.8');l2.setAttribute('stroke-linecap','round');
    cSvg.appendChild(l1);cSvg.appendChild(l2);
    pill.appendChild(cSvg);
  }

  // Long press / tap
  let pressTimer;
  pill.addEventListener('pointerdown',()=>{ pressTimer=setTimeout(()=>showProfile(p.id),500); });
  pill.addEventListener('pointerup',()=>{ clearTimeout(pressTimer); });
  pill.addEventListener('pointercancel',()=>{ clearTimeout(pressTimer); });
  pill.addEventListener('click',()=>{ showProfile(p.id); });

  div.appendChild(pill);

  // Expand/collapse button
  const expBtn=document.createElement('div');
  expBtn.className=`t-expand ${p.children && p.children.length?'':'hidden'}`;
  expBtn.textContent=isCollapsed?'+':p.children&&p.children.length?'−':'';
  expBtn.onclick=(e)=>{ e.stopPropagation(); toggleCollapse(p.id); };
  div.appendChild(expBtn);

  canvas.appendChild(div);
}

function toggleCollapse(id){
  if(collapsed.has(id)) collapsed.delete(id);
  else collapsed.add(id);
  renderTree();
}

function applyCrosses(){} // crosses drawn inline now

// ── Pan & zoom ──
function setTransform(){
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
}

function resetView(){
  // Centre the tree in the viewport
  setTimeout(()=>{
    const cw=canvas.style.width?parseInt(canvas.style.width):400;
    const ch=canvas.style.height?parseInt(canvas.style.height):400;
    const ww=wrap.clientWidth, wh=wrap.clientHeight;
    scale = Math.min(1, ww/(cw+40), wh/(ch+80));
    scale = Math.max(0.15, scale);
    panX = (ww - cw*scale)/2;
    panY = 40;
    setTransform();
  },50);
}

// Mouse
wrap.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  isPanning=true; lastPt={x:e.clientX,y:e.clientY};
  wrap.classList.add('panning');
});
window.addEventListener('mousemove',e=>{
  if(!isPanning) return;
  panX+=e.clientX-lastPt.x; panY+=e.clientY-lastPt.y;
  lastPt={x:e.clientX,y:e.clientY};
  setTransform();
});
window.addEventListener('mouseup',()=>{ isPanning=false; wrap.classList.remove('panning'); });
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const rect=wrap.getBoundingClientRect();
  const ox=e.clientX-rect.left, oy=e.clientY-rect.top;
  panX=ox-(ox-panX)*delta; panY=oy-(oy-panY)*delta;
  scale=Math.min(3,Math.max(0.1,scale*delta));
  setTransform();
},{passive:false});

// Touch
let touches=[];
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  touches=Array.from(e.touches);
  if(touches.length===1){ isPanning=true; lastPt={x:touches[0].clientX,y:touches[0].clientY}; }
  if(touches.length===2){ pinchDist=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY); }
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const ts=Array.from(e.touches);
  if(ts.length===1 && isPanning){
    panX+=ts[0].clientX-lastPt.x; panY+=ts[0].clientY-lastPt.y;
    lastPt={x:ts[0].clientX,y:ts[0].clientY};
    setTransform();
  }
  if(ts.length===2 && pinchDist!==null){
    const newDist=Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);
    const ratio=newDist/pinchDist;
    const cx=(ts[0].clientX+ts[1].clientX)/2-wrap.getBoundingClientRect().left;
    const cy=(ts[0].clientY+ts[1].clientY)/2-wrap.getBoundingClientRect().top;
    panX=cx-(cx-panX)*ratio; panY=cy-(cy-panY)*ratio;
    scale=Math.min(3,Math.max(0.1,scale*ratio));
    pinchDist=newDist;
    setTransform();
  }
},{passive:false});
wrap.addEventListener('touchend',()=>{ isPanning=false; pinchDist=null; touches=[]; });

// ── Orientation toggle ──
function setOrientation(o){
  orientation=o;
  document.getElementById('btn-v').classList.toggle('active',o==='v');
  document.getElementById('btn-h').classList.toggle('active',o==='h');
  // For left-right, rotate the canvas 90deg conceptually by swapping layout
  canvas.style.writingMode = o==='h'?'vertical-lr':'';
  renderTree(); resetView();
}

// ── Profile panel ──
function showProfile(id){
  const p=people[id]; if(!p) return;
  currentId=id;
  const cls=sc(p);
  document.getElementById('p-head').innerHTML=`
    <div class="p-avatar ${cls}">${ini(p.name)}</div>
    <div style="flex:1">
      <div class="p-name">${p.name}</div>
      <div class="p-gen">${genLbl(p.depth)}${p.city?' · '+p.city:''}</div>
      <div style="margin-top:6px">${smallPill(p)}</div>
    </div>
    <button class="close-x" onclick="document.getElementById('overlay').classList.remove('open')">×</button>
  `;
  let body='';
  if(p.birth) body+=fld('Born',p.birth);
  body+=fld('Status',p.deceased?(p.death?'Deceased · '+p.death:'Deceased'):'Living');
  if(p.city) body+=fld('City',p.city);
  if(p.parents&&p.parents.length) body+=fld('Parents',pillsOf(p.parents));
  if(p.spouses&&p.spouses.length) body+=fld('Spouse',pillsOf(p.spouses));
  body+=fld(`Children (${p.children?p.children.length:0})`, p.children&&p.children.length?pillsOf(p.children):'<span style="color:#bbb;font-style:italic">None recorded</span>');
  if(p.note) body+=fld('Notes',p.note);
  document.getElementById('p-body').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
}

function fld(lbl,val){ return `<div class="p-field"><div class="p-lbl">${lbl}</div><div class="p-val">${val}</div></div>`; }

function pillsOf(ids){
  return `<div class="p-pills">${ids.map(id=>{
    const q=people[id]; if(!q) return '';
    return `<div class="p-pill ${sc(q)}" onclick="showProfile('${id}')">${smallCross(q)}${q.name}</div>`;
  }).join('')}</div>`;
}

function smallPill(p){
  return `<div style="display:inline-flex;position:relative"><div class="p-pill ${sc(p)}">${smallCross(p)}${p.deceased?'Deceased':'Living'}</div></div>`;
}

function smallCross(p){
  if(!p.deceased) return '';
  const c=sc(p)==='female'?'#6E1F44':'#0B3F74';
  return `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;border-radius:18px;overflow:hidden" viewBox="0 0 80 28">
    <line x1="8" y1="6" x2="72" y2="22" stroke="${c}" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="72" y1="6" x2="8" y2="22" stroke="${c}" stroke-width="1.6" stroke-linecap="round"/>
  </svg>`;
}

function maybeClose(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }

// ── Edit ──
function startEdit(){
  if(!isAdmin){ document.getElementById('pin-overlay').classList.add('open'); document.getElementById('pin-inp').value=''; document.getElementById('pin-err').textContent=''; return; }
  doEdit();
}
function verifyPin(){
  if(document.getElementById('pin-inp').value===ADMIN_PIN){ isAdmin=true; document.getElementById('pin-overlay').classList.remove('open'); doEdit(); }
  else document.getElementById('pin-err').textContent='Incorrect PIN';
}
function doEdit(){
  const p=people[currentId]; if(!p) return;
  document.getElementById('p-body').innerHTML=`
    <div style="padding:4px 0">
      <div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Full Name</label>
      <input id="ef-n" value="${p.name}" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"></div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Gender</label>
        <select id="ef-s" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"><option value="M" ${p.sex==='M'?'selected':''}>Male</option><option value="F" ${p.sex==='F'?'selected':''}>Female</option></select></div>
        <div style="flex:1"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Status</label>
        <select id="ef-d" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"><option value="0" ${!p.deceased?'selected':''}>Living</option><option value="1" ${p.deceased?'selected':''}>Deceased</option></select></div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Birth Year</label>
        <input id="ef-b" value="${p.birth}" placeholder="e.g. 1952" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"></div>
        <div style="flex:1"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Death Year</label>
        <input id="ef-dd" value="${p.death}" placeholder="e.g. 2010" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"></div>
      </div>
      <div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">City</label>
      <input id="ef-c" value="${p.city}" placeholder="Vadodara" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"></div>
      <div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">Notes</label>
      <input id="ef-note" value="${p.note||''}" placeholder="Any notes…" style="width:100%;margin-top:4px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"></div>
      <button onclick="saveEdit()" style="width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">💾 Save</button>
    </div>`;
}
function saveEdit(){
  const p=people[currentId]; if(!p) return;
  p.name=document.getElementById('ef-n').value.trim()||p.name;
  p.sex=document.getElementById('ef-s').value;
  p.deceased=document.getElementById('ef-d').value==='1';
  p.birth=document.getElementById('ef-b').value.trim();
  p.death=document.getElementById('ef-dd').value.trim();
  p.city=document.getElementById('ef-c').value.trim();
  p.note=document.getElementById('ef-note').value.trim();
  document.getElementById('overlay').classList.remove('open');
  renderTree();
  setTimeout(()=>showProfile(currentId),100);
}

// ── Search ──
function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){ renderTree(); return; }
  // Highlight matching nodes
  document.querySelectorAll('.t-pill').forEach(el=>{
    const p=people[el.dataset.id];
    if(!p) return;
    const match=p.name.toLowerCase().includes(q)||(p.city&&p.city.toLowerCase().includes(q));
    el.style.opacity=match?'1':'0.2';
    el.style.transform=match?'scale(1.08)':'scale(1)';
  });
}

// ── Init ──
buildTabs();
</script>
</body>
</html>
